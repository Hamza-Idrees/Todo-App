name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Create .env File
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "TOKEN_EXPIRATION=${{ secrets.TOKEN_EXPIRATION }}" >> .env

      - name: Build and Start Docker Compose
        run: |
          docker-compose up --build -d
          sleep 10  # Corrected wait(10)
          docker ps

      - name: Setup SSH Keys
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
            echo "🚀 Connecting to EC2..."
            
            # Ensure project directory exists
            if [ ! -d "/home/ubuntu/my-app" ]; then
              echo "📂 Cloning repository..."
              git clone https://github.com/Hamza-Idrees/Todo-App.git /home/ubuntu/my-app
            fi

            # Navigate to project directory
            cd /home/ubuntu/my-app

            # Ensure Node.js & PM2 are installed
            if ! command -v node &> /dev/null; then
              echo "📦 Installing Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            if ! command -v pm2 &> /dev/null; then
              echo "📦 Installing PM2..."
              npm install -g pm2
            fi

            # Pull latest code
            echo "🔄 Pulling latest changes..."
            git reset --hard
            git pull origin master  # Ensure this matches your default branch

            # ✅ Ensure .env file is created properly
            echo "🔑 Creating .env file..."
            cat <<EOT > .env
            MONGO_URI=${{ secrets.MONGO_URI }}
            REDIS_URL=redis://todo-redis:6379
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            TOKEN_EXPIRATION=${{ secrets.TOKEN_EXPIRATION }}
            EOT

            # Build and run with Docker Compose
            echo "🚀 Running Docker Compose..."
            docker-compose down
            docker-compose up --build -d

            # Restart the application using PM2
            echo "🚀 Restarting application..."
            pm2 delete my-app || true  # Ensures no duplicate process
            pm2 start index.js --name my-app
          EOF