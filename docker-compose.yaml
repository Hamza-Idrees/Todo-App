version: '3.8'

networks:
  todo-network:

services:
  todo-app:
    build: .
    container_name: todo-app
    ports:
      - "3000:3000"
    depends_on:
      todo-mongo:
        condition: service_healthy
      todo-redis:
        condition: service_healthy  # ✅ Ensure Redis is ready before starting
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}   
      - REDIS_HOST=todo-redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY}
      - TOKEN_EXPIRATION=${TOKEN_EXPIRATION}
    env_file:
      - .env  
    networks:
      - todo-network
    restart: always  # Restart if crashed

  todo-mongo:
    image: mongo:6
    container_name: todo-mongo
    ports:
      - "27017:27017"
    networks:
      - todo-network
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  todo-redis:
    image: redis:alpine
    container_name: todo-redis
    ports:
      - "6379:6379"
    networks:
      - todo-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
